<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾助理 - 左右并排 AI 增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f0f2f5; }
        
        /* 布局调整：确保左右排列 */
        .main-container {
            display: flex;
            flex-direction: row; /* 强制水平排列 */
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        .control-panel {
            flex: 1;
            min-width: 450px;
            max-width: 600px;
        }

        .mobile-view { 
            width: 375px; 
            height: 750px; 
            background: #f8f9fa; 
            border: 10px solid #1a1a1a; 
            border-radius: 40px; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
            flex-shrink: 0;
        }

        .card-anim { transition: all 0.3s ease; }
        .btn-scenario { font-size: 11px; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; background: white; cursor: pointer; text-align: left; transition: all 0.2s; width: 100%; }
        .btn-scenario:hover { background: #f3f4f6; }
        .btn-scenario.active { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; font-weight: bold; }
        .chat-container { height: calc(100% - 100px); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        
        /* AI 加载动画 */
        .ai-loading { display: inline-flex; gap: 4px; }
        .ai-loading span { width: 4px; height: 4px; background: currentColor; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .ai-loading span:nth-child(1) { animation-delay: -0.32s; }
        .ai-loading span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-10">

    <div class="main-container">
        
        <!-- 左侧：卡片场景切换控制台 -->
        <div class="control-panel bg-white p-8 rounded-3xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold mb-4 text-gray-800">卡片场景切换 (AI 增强版)</h2>
            
            <div class="space-y-6">
                <!-- 分组 1 -->
                <div>
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">1. 初审状态 (无标识)</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="render('wait_normal')" class="btn-scenario">初审中 (24h内)</button>
                        <button onclick="render('wait_overtime')" class="btn-scenario">初审中 (超24h)</button>
                    </div>
                </div>

                <!-- 分组 2 -->
                <div>
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">2. 已入选状态 (1.0优质)</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="render('featured_incentive')" class="btn-scenario">已精选 (有激励/有按钮)</button>
                        <button onclick="render('featured_wait_normal')" class="btn-scenario">已精选 (待激励/次日22点内)</button>
                        <button onclick="render('featured_wait_overtime')" class="btn-scenario">已精选 (待激励/超次日22点)</button>
                    </div>
                </div>

                <!-- 分组 3 -->
                <div>
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">3. 申诉与复核 (1.0非优质)</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="render('intercept')" class="btn-scenario">准入拦截 (违规/超时)</button>
                        <button onclick="render('appeal_confirm')" class="btn-scenario text-blue-600 font-bold">申诉确认卡 (✨ AI 润色)</button>
                        <button onclick="render('appeal_done')" class="btn-scenario">申诉已发起</button>
                        <button onclick="render('appeal_progress_normal')" class="btn-scenario">复核中 (24h内)</button>
                        <button onclick="render('appeal_progress_overtime')" class="btn-scenario">复核中 (超24h)</button>
                        <button onclick="render('result_success')" class="btn-scenario text-green-600">复核成功喜报</button>
                        <button onclick="render('result_failed')" class="btn-scenario text-gray-500">复核失败 (✨ 获取改片建议)</button>
                    </div>
                </div>

                <!-- 分组 4 -->
                <div>
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">4. 异常与转人工</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="render('blocked_penalty')" class="btn-scenario">精选业务-处罚拦截</button>
                        <button onclick="render('non_business')" class="btn-scenario">非精选业务转人工</button>
                        <button onclick="render('emotion_upgrade')" class="btn-scenario text-red-500">✨ AI 情绪感知升级</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 p-5 bg-blue-50 rounded-2xl border border-blue-100">
                <p class="text-[11px] text-blue-600 leading-relaxed font-medium">
                    ✨ <b>AI 集成：</b> 润色申诉、调优建议、情绪感知均为实时生成。<br>
                    🛡️ <b>去敏化：</b> 已隐藏“Oncall”术语，统一使用“升级运营排查”。
                </p>
            </div>
        </div>

        <!-- 右侧：手机模拟预览 -->
        <div class="mobile-view">
            <div class="chat-container" id="chatArea"></div>
            <!-- 输入框占位 -->
            <div class="absolute bottom-0 w-full h-16 bg-white border-t border-gray-100 flex items-center px-4">
                <div class="flex-1 bg-gray-100 h-9 rounded-full px-4 text-[11px] text-gray-400 flex items-center">
                    输入你想咨询的问题...
                </div>
            </div>
        </div>

    </div>

    <script>
        const apiKey = ""; // 环境变量自动注入

        const cards = {
            wait_normal: {
                theme: "blue", title: "初审进行中", icon: "🕒",
                content: "小助手查看到咱们作品发布时间较短，请您再耐心等待下哦～若作品入选“精选内容”，我们通常会在次日20点-22点发送通知。",
                btns: []
            },
            wait_overtime: {
                theme: "orange", title: "初审排查中", icon: "🔍",
                content: "作品发布已超过24小时仍未出结果，小助手正在为您升级运营团队进行专项排查，请您留意后续通知。",
                btns: []
            },
            featured_incentive: {
                theme: "green", title: "已入选精选", icon: "🎉",
                content: "恭喜！小助手帮您查到这条作品已经入选精选内容了，您可以前往创作者中心查看获得的额外流量扶持或现金激励。",
                btns: ["去数据中心查看"]
            },
            featured_wait_normal: {
                theme: "blue", title: "精选通知待下发", icon: "✨",
                content: "作品已被标记为优质，通知通常会在发布次日的20点-22点发送。请老师再耐心等待下哦～",
                btns: []
            },
            featured_wait_overtime: {
                theme: "orange", title: "系统持续迭代中", icon: "⚙️",
                content: "抖音精选计划还在持续迭代中，是否入选精选内容请以数据中心展示为准，您可以持续留意数据中心的展示哦～<br><br>您也可以通过创作者中心顶部-头像下方抖音精选计划入口-计划页内查看【成长指南】案例详细拆解或课程推荐，或者直接主页搜索【月度精选作者】，参考同类型作者作品继续优化投稿。",
                btns: []
            },
            intercept: {
                theme: "gray", title: "暂不满足复核条件", icon: "🚫",
                content: "很遗憾，由于作品[发布时间早于加入计划时间/近90天存在严重违规/发布已超14天]，目前无法为您发起申诉复核。",
                btns: []
            },
            appeal_confirm: {
                theme: "blue", title: "申诉理由确认", icon: "✍️",
                content: "正在为您自动生成申诉理由...",
                useAI: "polish_appeal",
                btns: ["取消申诉", "✨ 智能润色", "确认提交"]
            },
            appeal_done: {
                theme: "blue", title: "申诉已发起", icon: "🚀",
                content: "龙虾已为您代办申诉，预计24小时内反馈结果。结果出来后，我会第一时间在群里通知您，请留意系统通知～",
                btns: []
            },
            appeal_progress_normal: {
                theme: "blue", title: "复核进行中", icon: "🕒",
                content: "小助手帮您查询到这条作品已经在复核中了，复核结果预计会在24小时左右给出；如复核成功，会给您发送站内信通知。",
                btns: []
            },
            appeal_progress_overtime: {
                theme: "orange", title: "复核进度反馈", icon: "🔍",
                content: "复核申请已提交超过24小时。小助手已为您升级运营团队排查，我们会尽快为您反馈复核结果。",
                btns: []
            },
            result_success: {
                theme: "green", title: "复核成功喜报", icon: "🎊",
                content: "您好，小助手帮您查到这条作品已经复核成功，入选通知会在今天或明天的20-22点下发。提示：平台会在T+3日内补发现金收益。",
                btns: []
            },
            result_failed: {
                theme: "gray", title: "复核维持原判", icon: "🏁",
                content: "很遗憾，这条作品已经提交过复核，暂未入选精选内容。",
                useAI: "advice",
                btns: ["✨ 获取改片秘籍"]
            },
            blocked_penalty: {
                theme: "red", title: "转人工处理", icon: "👩‍💼",
                content: "龙虾目前申诉通道繁忙，且检测到作品当前存在处罚限制。我已经艾特人工客服 @王帅 啦，请稍等专家接入。",
                btns: []
            },
            non_business: {
                theme: "slate", title: "超出服务范畴", icon: "❓",
                content: "这个问题超过了龙虾的处理范畴。我已经艾特人工客服帮您处理啦，请稍等专家接入解决。",
                btns: []
            },
            emotion_upgrade: {
                theme: "red", title: "服务升级中", icon: "💖",
                content: "正在评估您的诉求并呼叫专家...",
                useAI: "empathy",
                btns: ["查看进度"]
            }
        };

        const themeStyles = {
            blue: { head: "bg-blue-50 text-blue-700", badge: "bg-blue-200 text-blue-800", accent: "bg-blue-500" },
            green: { head: "bg-green-50 text-green-700", badge: "bg-green-200 text-green-800", accent: "bg-green-500" },
            orange: { head: "bg-orange-50 text-orange-700", badge: "bg-orange-200 text-orange-800", accent: "bg-orange-500" },
            red: { head: "bg-red-50 text-red-700", badge: "bg-red-200 text-red-800", accent: "bg-red-600" },
            gray: { head: "bg-gray-50 text-gray-700", badge: "bg-gray-200 text-gray-800", accent: "bg-gray-500" },
            slate: { head: "bg-slate-50 text-slate-700", badge: "bg-slate-200 text-slate-800", accent: "bg-slate-700" }
        };

        async function callGemini(prompt, systemPrompt = "你是一个专业的短视频运营专家。") {
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
            return "服务暂时繁忙，请稍后再试。";
        }

        async function getAIPolish(id) {
            const container = document.getElementById('ai-text-' + id);
            if (!container) return;
            container.innerHTML = '<div class="ai-loading"><span></span><span></span><span></span></div> ✨ AI 正在思考...';
            
            let prompt = "";
            let sys = "你是一个资深的短视频内容审核专家。";
            
            if (id === 'appeal_confirm') {
                prompt = "为一条关于'春季Vlog记录生活'的视频写一段简短的申诉理由（50字内）。强调画面采用了艺术滤镜效果，而非画质模糊。语气专业、恳切。";
            } else if (id === 'result_failed') {
                prompt = "一个关于'美食探店'的视频申诉被拒绝了，原因是营销感太强。请给出3条针对性的改片建议，语气鼓励且具备实操性。";
            } else if (id === 'emotion_upgrade') {
                prompt = "用户现在情绪很激动，因为他的申诉没过。请生成一段非常得体、具备同理心的安抚话术，并承诺会由运营专家团队进行深度排查。";
            }

            const aiResult = await callGemini(prompt, sys);
            container.innerHTML = aiResult.replace(/\n/g, '<br>');
        }

        function render(id) {
            const data = cards[id];
            if (!data) return;
            const theme = themeStyles[data.theme];
            const container = document.getElementById('chatArea');
            
            document.querySelectorAll('.btn-scenario').forEach(b => {
                if (b.classList) b.classList.remove('active');
            });
            const triggerBtn = document.querySelector(`button[onclick*="'${id}'"]`);
            if (triggerBtn && triggerBtn.classList) triggerBtn.classList.add('active');

            const aiId = `ai-text-${id}`;
            let cardHtml = `
                <div class="card-anim w-full bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-4 py-3 flex justify-between items-center ${theme.head}">
                        <div class="flex items-center space-x-2">
                            <span class="text-base">${data.icon}</span>
                            <span class="text-[11px] font-bold">${data.title}</span>
                        </div>
                        <span class="text-[8px] font-extrabold px-1.5 py-0.5 rounded-full ${theme.badge}">SELECTED PLAN</span>
                    </div>
                    <div class="p-3 flex space-x-3 border-b border-gray-50">
                        <div class="w-14 h-18 bg-gray-100 rounded-xl bg-cover bg-center flex-shrink-0" style="background-image: url('https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=200')"></div>
                        <div class="flex flex-col justify-center overflow-hidden">
                            <h4 class="text-[12px] font-bold text-gray-800 truncate">作品审核咨询案例.mp4</h4>
                            <p class="text-[9px] text-gray-400 mt-0.5">发布时间：今天 10:24</p>
                        </div>
                    </div>
                    <div class="p-4">
                        <div id="${aiId}" class="text-[12px] leading-relaxed text-gray-600 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                            ${data.content}
                        </div>
                    </div>
                    ${data.btns.length > 0 ? `
                        <div class="px-4 pb-4 flex flex-wrap gap-2">
                            ${data.btns.map((b, i) => {
                                const isAction = b.includes('✨') || b === '确认提交' || b === '去数据中心查看' || b === '查看进度';
                                const isCancel = b === '取消申诉';
                                const clickAction = isCancel ? "render('wait_normal')" : (b.includes('✨') ? `getAIPolish('${id}')` : "");
                                
                                return `<button onclick="${clickAction}" class="${!isAction ? 'px-4 py-2 bg-gray-100 text-gray-500' : 'flex-1 py-2 ' + theme.accent + ' text-white'} text-[11px] font-bold rounded-xl active:scale-95 transition-all">
                                    ${b}
                                </button>`;
                            }).reverse().join('')}
                        </div>
                    ` : ''}
                </div>
            `;

            container.innerHTML = `<div class="text-[10px] text-gray-300 text-center mb-2 animate-pulse">龙虾助理正在同步数据...</div>`;
            setTimeout(() => {
                container.innerHTML = cardHtml;
                container.scrollTop = container.scrollHeight;
                if (id === 'appeal_confirm' || id === 'emotion_upgrade') {
                    getAIPolish(id);
                }
            }, 400);
        }

        window.onload = () => {
            render('wait_normal');
        };
    </script>
</body>
</html>
